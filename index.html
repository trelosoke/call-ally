<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallAlly</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body>
    <header>
        <span class="material-symbols-outlined">menu</span><h1>CallAlly</h1>
        <div><span>icon</span>Linha do tempo</div>
    </header>
    <main>
        <section class="new-call-form">
            <button class="new-call" id="new-call">Novo chamado</button>
            <form class="call-form" id="call-form" action="" method="POST">
                <h2>Novo Chamado</h2>
                <label for="name">Nome:</label><input type="text" name="name" id="name" required maxlength="">
                <label for="descript">Pequena descrição</label><input type="text" name="descript" id="descript" required>
                <label for="full-descript">Descrição detalhada</label><textarea name="full-descript" id="full-descript" required></textarea>
                
                <h3>Vencimento:</h3>
                <label for="day">Dia:</label><input type="number" name="day" id="day" required>
                <label for="month">Mês:</label><input type="number" name="month" id="month" required>
                <label for="year">Ano:</label><input type="number" name="year" id="year" required>
                <label for="time">Horário:</label><input type="time" name="time" id="time" required>

                <h3>Prioridade</h3>
                <input type="radio" name="prior" id="prior1" value="I" required>
                <input type="radio" name="prior" id="prior2" value="II" required>
                <input type="radio" name="prior" id="prior3" value="III" required>

                <h3>Adicionar / tags</h3>
                <button class="new-tag" id="new-tag">+</button>
                <div class="tag-menu hidden" id="tag-menu">
                    <label for="tag-name"><h3>Nome da tag:</h3></label><input type="text" name="tag-name" id="tag-name">
                    <label for="tag-color"><h3>Cor:</h3></label><input type="color" name="tag-color" id="tag-color" value="#000000">
                    <button class="tag-submit" id="tag-submit">Adicionar</button>
                </div>

                <div class="no-tag-warning hidden" id="no-tag-warning">Adicione ao menos uma tag</div>

                <section class="form-action">
                    <button type="reset" class="cancel-call" id="cancel-call">CANCELAR</button>
                    <input type="submit" value="SALVAR">
                </section>
            </form>
        </section>

        <section class="all-calls">

        </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
