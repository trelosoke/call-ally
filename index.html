<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallAlly</title>
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body>
    <header>
        <span class="material-symbols-outlined">menu</span><h1>CallAlly</h1>
        <div><span>icon</span>Linha do tempo</div>
    </header>
    <main>
        <section class="new-call-form">
            <button class="new-call" id="new-call">Novo chamado</button>
            <form class="call-form" id="call-form" action="" method="POST">
                <label for="name">Nome:</label><input type="text" name="name" id="name" required>
                <label for="descript">Pequena descrição</label><input type="text" name="descript" id="descript" required>
                <label for="full-descript">Descrição detalhada</label><textarea name="full-descript" id="full-descript" required></textarea>
                
                <h2>Vencimento:</h2>
                <label for="day">Dia:</label><input type="number" name="day" id="day" required>
                <label for="month">Mês:</label><input type="number" name="month" id="month" required>
                <label for="year">Ano:</label><input type="number" name="year" id="year" required>

                <h2>Prioridade</h2>
                <input type="radio" name="prior" id="prior1" value="I" required>
                <input type="radio" name="prior" id="prior2" value="II" required>
                <input type="radio" name="prior" id="prior3" value="III" required>

                <h2>Adicionar / tags</h2>
                <button class="new-tag" id="new-tag">+</button>

                <button class="cancel-call" id="cancel-call">CANCELAR</button>
                <input type="submit" value="SALVAR">
            </form>
        </section>

        <section class="all-calls">

        </section>
    </main>
    <script src="scripts/script.js"></script>
</body>
</html>
